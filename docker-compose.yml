version: "3.8"

services:
  simulation:
    build: .
    container_name: energy_sim
    depends_on:
      - mysql
    ports:
      - "8000:8000"

  mysql:
    image: mysql:8
    container_name: energy_mysql
    environment:
      MYSQL_ROOT_PASSWORD: "$haqiL10"
      MYSQL_DATABASE: energy
    ports:
      - "3307:3306"

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus