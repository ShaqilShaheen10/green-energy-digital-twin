services:

  mysql:
    image: mysql:8
    container_name: energy_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: energy
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3000:3000"

  simulation:
    build: .
    container_name: energy_sim
    depends_on:
      - mysql
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data